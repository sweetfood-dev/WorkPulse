version = 1
profile = "workpulse-macos-clean-architecture"

[source]
roots = ["App", "Feature", "UI"]
extensions = [".swift"]

[mode]
unknown_paths = "warn"
multi_layer_match = "error"
forbidden_imports = "error"
forbidden_content = "error"
ownership = "error"
expired_exemptions = "error"

[layers.types]
paths = ["App/**/Types/**", "Feature/**/Types/**", "UI/**/Types/**"]
forbidden_import_prefixes = ["AppKit", "UIKit", "SwiftUI", "Combine", "Realm", "RealmSwift", "CoreData", "Alamofire", "Moya", "Firebase", "RxSwift"]

[layers.config]
paths = ["App/**/Config/**", "Feature/**/Config/**", "UI/**/Config/**"]
forbidden_import_prefixes = ["AppKit", "UIKit", "SwiftUI", "Realm", "RealmSwift", "CoreData", "Alamofire", "Moya", "Firebase"]

[layers.domain]
paths = ["Feature/**/Domain/**"]
forbidden_import_prefixes = ["AppKit", "UIKit", "SwiftUI", "Realm", "RealmSwift", "CoreData", "Alamofire", "Moya", "Firebase", "MapKit"]

[layers.repo]
paths = ["Feature/**/Repo/**"]
forbidden_import_prefixes = ["AppKit", "UIKit", "SwiftUI"]

[layers.service]
paths = ["Feature/**/Service/**", "Feature/**/UseCase/**"]
forbidden_import_prefixes = ["AppKit", "UIKit", "SwiftUI", "Realm", "RealmSwift", "CoreData", "Alamofire", "Moya", "Firebase"]

[layers.runtime]
paths = ["App/**"]
forbidden_import_prefixes = []

[layers.ui]
paths = ["UI/**", "Feature/**/UI/**", "Feature/**/Presentation/**"]
forbidden_import_prefixes = ["Realm", "RealmSwift", "CoreData"]

[[zones]]
id = "generated"
path_globs = ["App/**/Generated/**", "Feature/**/Generated/**", "UI/**/Generated/**", "**/*.generated.swift"]
policy = "skip"

[[zones]]
id = "tests"
path_globs = ["Tests/**", "**/*Tests.swift", "**/*UITests.swift"]
policy = "relaxed"

[[ownership_rules]]
id = "view-controller-layer"
path_globs = ["**/*ViewController.swift"]
allowed_layers = ["ui"]
message = "ViewController files must live in the ui layer."

[[ownership_rules]]
id = "view-model-layer"
path_globs = ["**/*ViewModel.swift", "**/*Presenter.swift"]
allowed_layers = ["ui"]
message = "ViewModel and Presenter files must live in the ui layer."

[[ownership_rules]]
id = "use-case-layer"
path_globs = ["**/*UseCase.swift"]
allowed_layers = ["service"]
message = "UseCase files must live in the service layer."

[[ownership_rules]]
id = "dto-layer"
path_globs = ["**/*DTO.swift"]
allowed_layers = ["repo"]
message = "DTO files must live in the repo layer."

[[ownership_rules]]
id = "mapper-layer"
path_globs = ["**/*Mapper.swift"]
allowed_layers = ["repo"]
message = "Mapper files must live in the repo layer."

[[ownership_rules]]
id = "app-entry-layer"
path_globs = ["**/AppDelegate.swift", "**/SceneDelegate.swift"]
allowed_layers = ["runtime"]
message = "Application entrypoints must live in the runtime layer."

[[ownership_rules]]
id = "main-entry-layer"
path_globs = ["**/main.swift"]
allowed_layers = ["runtime"]
message = "Application main entrypoints must live in the runtime layer."

[[ownership_rules]]
id = "shell-controller-layer"
path_globs = ["**/*ShellController.swift"]
allowed_layers = ["runtime"]
message = "Menu bar shell controllers must live in the runtime layer."

[[content_rules]]
id = "no-task-detached"
layers = ["domain", "repo", "service", "runtime", "ui"]
pattern = "\\bTask\\.detached\\b"
message = "Task.detached is forbidden by default. Prefer structured concurrency or add a time-boxed exemption."

[[content_rules]]
id = "ui-types-outside-ui"
layers = ["types", "config", "domain", "repo", "service"]
pattern = "\\bUIViewController\\b|\\bNSViewController\\b|\\bNSView\\b|\\bNSWindow\\b|\\bNSPopover\\b|\\bNSStatusItem\\b|\\bNSDatePicker\\b|\\b@IBOutlet\\b|\\b@IBAction\\b"
message = "AppKit/UIKit presentation types must stay in the ui layer."

[[content_rules]]
id = "userdefaults-outside-repo-runtime"
layers = ["types", "config", "domain", "service", "ui"]
pattern = "\\bUserDefaults\\b"
message = "UserDefaults must stay behind a repo adapter or runtime composition root."

[[content_rules]]
id = "direct-time-context-outside-runtime"
layers = ["domain", "repo", "service", "ui"]
pattern = "\\bDate\\(\\)|\\bDate\\.init\\b|\\bCalendar\\.current\\b|\\bTimeZone\\.current\\b|\\bLocale\\.current\\b"
message = "Use injected date/calendar/timezone/locale dependencies instead of direct current context access."
