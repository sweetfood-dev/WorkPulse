name: Architecture Invariants

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Smoke Test Architecture Linter
        run: make test-architecture-linter

      - name: Verify Project Architecture Invariants
        run: make verify-architecture
