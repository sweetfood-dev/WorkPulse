name: Golden Principles

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  golden_principles:
    name: Golden Principles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Golden Principles Registry
        run: make verify-golden-principles

      - name: Smoke Test Golden Principles Tools
        run: make test-golden-principles
