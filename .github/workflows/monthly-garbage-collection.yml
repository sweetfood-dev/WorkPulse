name: Monthly Garbage Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 1 * *"

concurrency:
  group: monthly-garbage-collection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  garbage_collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Garbage Collection
        run: make garbage-collect

      - name: Classify GC Actions
        run: make classify-gc-actions

      - name: Apply Safe Cleanups
        run: make apply-safe-cleanups

      - name: Verify Starter Baseline
        run: make verify-all

      - name: Create Draft Cleanup PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/monthly-gc
          commit-message: "Run monthly garbage collection"
          title: "Monthly garbage collection"
          body: |
            Generated monthly garbage collection report, classified findings, and applied only allowlisted safe cleanups.

            Review:
            - generated garbage collection reports
            - any active cleanup plan skeleton
            - whether the auto-applied changes stayed inside the configured allowlist
          draft: true
